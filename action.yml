name: "ShipStatic"
description: "Deploy static files using @shipstatic/ship SDK"
author: "ShipStatic"
inputs:
  api-key:
    description: "ShipStatic API key (required for authentication)"
    required: true
  api-url:
    description: "ShipStatic API endpoint URL"
    required: false
    default: "https://api.shipstatic.com"
  operation:
    description: "Operation to perform: deploy or alias"
    required: true
    default: "deploy"
  path:
    description: "Path to static files to deploy"
    required: false
    default: "."
  alias-name:
    description: "Alias name to create (required for alias operation)"
    required: false
  deployment-id:
    description: "Deployment ID to point alias to (required for alias operation)"
    required: false
outputs:
  deployment-id:
    description: "The deployment ID"
  deployment-url:
    description: "The deployment URL"
  alias-url:
    description: "The alias URL (for alias operations)"
runs:
  using: "node20"
  main: "index.js"
branding:
  icon: "upload-cloud"
  color: "orange"
